password:
  # Seta se o jogador precisará confirmar a senha ou não
  register-confirmation: false
  # Seta o tamanho minimo em caracteres da senha que o jogador precisa registrar
  min-length: 4
  # Seta o tamanho maximo da senha do jogador
  max-password-length: 25


# Cooldown da mensagem enviada quando o jogador é bloquado 
# de fazer uma ação por não estar logado (em segundos)
block-alert-cooldown: 10
...