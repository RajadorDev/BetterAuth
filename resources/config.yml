---
#
# BetterAuth Settings
#
# Created by: Rajador, Bietio, NATANBX0
#

# Prefixo das mensagens enviada aos jogadores
prefix: '§a§lBETTER§bAUTH  §r§7'

password:
  # Seta se o jogador precisará confirmar a senha ou não
  register-confirmation: false
  # Seta o tamanho minimo em caracteres da senha que o jogador precisa registrar
  min-length: 4
  # Seta o tamanho maximo da senha do jogador
  max-length: 25


# Cooldown da mensagem enviada quando o jogador é bloquado 
# de fazer uma ação por não estar logado (em segundos)
block-alert-cooldown: 15

# Ativar auto login por endereço IP (Recomendado)
auto-login: true

# Sala de espera do login
logged-out-room:
  # Define se ativa ou desativa a sala de deslogados (onde jogadores deslogados ficam)
  enabled: true
  # Mapa em que jogadores deslogados ficaram
  world: 'LoggedOutRoom'
  # Mapa que os jogadores serão teleportados ao logarem com sucesso (null = mapa padrão do servidor)
  target-login-world: null
  # Permitir jogadores de se mover no mapa de espera?
  allow-move: true


# Auto atualizar o plugin usando a API do GitHub?
auto-update: true

# Ocultar alguns caracteres da senha quando o jogador registrar/trocar a senha
hide-password:
  # Se false: a senha será exibida completamente
  enabled: true
  # Porcentagem de caracteres que serão exibidos:
  chars-percent: 25.0

# Tempo maximo para que o jogador registre/logue no servidor (se zerado desativa o tempo maximo) em segundos
max-auth-time: 35

# Quantidade maxima de login que uma pessoa pode tentar
max-login-attempts: 5

# Teleportar o jogador para o lobby quando entrar (esta opção só funcionará se a opção logged-out-room estiver desativada ou não ser inicializada corretamente)
join-player-teleport: true


# Ocultar nome do jogador quando ele não está autenticado?
hide-loggout-players: true

# Sistema que envia oque o comando que o jogador deve fazer na tela dele (login/register)
auth-tips:
  # Ativa o sistema de dicas
  enabled: true
  # Textos enviados como dica para o jogador se logar
  login:
    tip: "§b§lBEM VINDO DE VOLTA §f{username}§r\n \n \n "
    popup: "§7Logue-se usando: §f/login <senha: string>"
  # Textos enviados como dica para o jogador se registrar
  register:
    tip: "§b§lBEM VINDO §r§f{username}\n \n \n "
    popup: "§7Se registre usando §f/register <senha: string> {password_confirmation}"


# Versão da configuração
# Isso será usado no futuro para atualizar as suas configurações automaticamente
# (NÃO ALTERE ISSO, É PARA USO INTERNO DO PLUGIN)
config-version: 1
...